<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>명당 - 로그인</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="css/style.css?v=38" />
</head>
<body class="login-page">

  <!-- 로그인 페이지 자체 헤더: 이미 로그인 화면이라 "로그인" 버튼은 없음 (랜딩페이지 헤더에만 있음) -->
  <header id="topbar">
    <h1><img src="assets/logo.svg" alt="명당" /></h1>
  </header>

  <main class="login-main">

    <!-- 휴대폰 인증 로그인 -->
    <section class="login-card" id="phone-form">
      <div class="login-head">
        <img class="login-logo" src="assets/logo.svg" alt="명당" />
        <p class="login-tagline">휴대폰 인증으로 간편하게 시작하세요.</p>
      </div>

      <div class="login-fields">
        <div class="login-inputs">
          <input type="tel" id="phone-input" placeholder="휴대폰 번호 ('-' 없이 입력)" autocomplete="tel" inputmode="numeric" />
          <p class="login-error" id="phone-error"></p>
        </div>
        <button class="login-submit" id="btn-send-code">인증번호 받기</button>

        <!-- 인증번호 받기 누르면 아래에 표시 -->
        <div class="login-inputs" id="code-section" hidden>
          <input type="text" id="code-input" placeholder="인증번호 6자리" inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
          <p class="login-hint" id="code-hint"></p>
          <p class="login-error" id="code-error"></p>
        </div>
        <button class="login-submit" id="btn-verify" hidden>인증</button>
      </div>
    </section>

  </main>

  <script src="js/config.js?v=37"></script>
  <script src="js/auth.js?v=37"></script>
  <script src="js/login.js?v=37"></script>

</body>
</html>
