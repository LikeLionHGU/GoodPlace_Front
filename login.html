<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>명당 - 로그인</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="css/style.css?v=24" />
</head>
<body class="login-page">

  <!-- 로그인 페이지 자체 헤더: 이미 로그인 화면이라 "로그인" 버튼은 없음 (랜딩페이지 헤더에만 있음) -->
  <header id="topbar">
    <h1><img src="assets/logo.svg" alt="명당" /></h1>
  </header>

  <main class="login-main">

    <!-- 로그인 폼 (기본) -->
    <section class="login-card" id="login-form">
      <div class="login-head">
        <img class="login-logo" src="assets/logo.svg" alt="명당" />
        <p class="login-tagline">로그인 후 더 많은 서비스를 즐겨보세요.</p>
      </div>

      <div class="login-fields">
        <div class="login-inputs">
          <input type="text" id="login-id" placeholder="아이디" autocomplete="username" />
          <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password" />
          <p class="login-error" id="login-error"></p>
        </div>
        <button class="login-submit" id="btn-login">로그인</button>
      </div>

      <div class="login-links">
        <a href="#" id="goto-signup">회원가입</a>
        <span class="link-divider"></span>
        <a href="#" id="find-account">계정찾기</a>
        <span class="link-divider"></span>
        <a href="#" id="find-password">비밀번호 찾기</a>
      </div>

      <div class="login-divider"><span>또는</span></div>

      <div class="login-social">
        <button class="social" title="네이버 로그인 (추후 연동)"><img src="assets/naver.svg" alt="네이버" /></button>
        <button class="social" title="카카오 로그인 (추후 연동)"><img src="assets/kakao.svg" alt="카카오" /></button>
        <button class="social" title="구글 로그인 (추후 연동)"><img src="assets/google.svg" alt="구글" /></button>
      </div>
    </section>

    <!-- 회원가입 폼 -->
    <section class="login-card" id="signup-form" hidden>
      <div class="login-head">
        <img class="login-logo" src="assets/logo.svg" alt="명당" />
        <p class="login-tagline">가입하면 <b>50냥</b>을 바로 드려요!</p>
      </div>

      <div class="login-fields">
        <div class="login-inputs">
          <input type="text" id="signup-nickname" placeholder="닉네임" />
          <input type="text" id="signup-id" placeholder="아이디" autocomplete="username" />
          <input type="password" id="signup-pw" placeholder="비밀번호" autocomplete="new-password" />
          <input type="password" id="signup-pw2" placeholder="비밀번호 확인" autocomplete="new-password" />
          <p class="login-error" id="signup-error"></p>
        </div>
        <button class="login-submit" id="btn-signup">가입하기</button>
      </div>

      <div class="login-links">
        <a href="#" id="goto-login">로그인으로 돌아가기</a>
      </div>
    </section>

  </main>

  <script src="js/config.js?v=24"></script>
  <script src="js/auth.js?v=24"></script>
  <script src="js/login.js?v=24"></script>

</body>
</html>
